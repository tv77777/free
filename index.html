<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الطائرات - Neon Sky</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 100%; 
            height: 100vh; 
            overflow: hidden; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            width: 100%;
            height: 100%;
            max-width: 600px;
            position: relative;
            background: #000;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0e27, #1a1a4d);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #00ff88;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            z-index: 10;
            display: flex;
            justify-content: space-between;
        }
        #menu, #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #00ff88;
            text-align: center;
        }
        #menu.hidden, #gameOver.hidden { display: none; }
        h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px #00ff88; }
        p { font-size: 16px; margin: 10px 0; color: #00ddff; }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            border: 2px solid #00ff88;
            background: transparent;
            color: #00ff88;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="ui">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
            <div>الصحة: <span id="health">100</span>%</div>
        </div>
        <div id="menu">
            <h1>🚀 NEON SKY 🚀</h1>
            <p>لعبة الطائرات الأسطورية</p>
            <p style="margin-top: 30px;">استخدم الأسهم أو اللمس للتحرك</p>
            <p>اضغط على المسافة أو انقر للإطلاق</p>
            <button onclick="startGame()">ابدأ اللعب</button>
        </div>
        <div id="gameOver" class="hidden">
            <h1>💥 GAME OVER 💥</h1>
            <p>مجموع نقاطك: <span id="finalScore">0</span></p>
            <p>المستوى: <span id="finalLevel">1</span></p>
            <button onclick="startGame()">إعادة اللعب</button>
            <button onclick="goMenu()">الرئيسية</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');
        
        // ضبط الحجم
        function resizeCanvas() {
            canvas.width = gameContainer.clientWidth;
            canvas.height = gameContainer.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // متغيرات اللعبة
        let gameRunning = false;
        let score = 0;
        let level = 1;
        let health = 100;
        let keys = {};
        let touchX = null;
        let touchY = null;

        // اللاعب
        const player = {
            x: 0,
            y: 0,
            w: 40,
            h: 40,
            speed: 6
        };

        let bullets = [];
        let enemies = [];
        let particles = [];

        // تهيئة
        function init() {
            player.x = canvas.width / 2 - 20;
            player.y = canvas.height - 80;
            score = 0;
            level = 1;
            health = 100;
            bullets = [];
            enemies = [];
            particles = [];
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
            document.getElementById('health').innerText = health;
        }

        // التحكم بلوحة المفاتيح
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                if (gameRunning) shoot();
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // التحكم باللمس
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchX = touch.clientX - rect.left;
            touchY = touch.clientY - rect.top;
            if (gameRunning) shoot();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchX = touch.clientX - rect.left;
            touchY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
            touchY = null;
        });

        function shoot() {
            bullets.push({
                x: player.x + 20,
                y: player.y,
                w: 3,
                h: 15,
                speed: 10
            });
        }

        function spawnEnemy() {
            if (Math.random() < 0.02 + level * 0.005) {
                enemies.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    w: 30,
                    h: 30,
                    speed: 2 + level * 0.5,
                    health: 1 + Math.floor(level / 3),
                    maxHealth: 1 + Math.floor(level / 3)
                });
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: `hsl(${Math.random() * 60}, 100%, 50%)`
                });
            }
        }

        function update() {
            if (!gameRunning) return;

            // حركة اللاعب
            if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < canvas.width - player.w) player.x += player.speed;
            if ((keys['ArrowUp'] || keys['w'] || keys['W']) && player.y > 0) player.y -= player.speed;
            if ((keys['ArrowDown'] || keys['s'] || keys['S']) && player.y < canvas.height - player.h) player.y += player.speed;

            // حركة اللاعب باللمس
            if (touchX !== null && touchY !== null) {
                const dx = touchX - (player.x + 20);
                const dy = touchY - (player.y + 20);
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 10) {
                    player.x += (dx / dist) * player.speed;
                    player.y += (dy / dist) * player.speed;
                    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
                    player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));
                }
            }

            // تحديث الرصاص
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // تحديث الأعداء
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                // تصادم مع اللاعب
                if (
                    player.x < enemies[i].x + enemies[i].w &&
                    player.x + player.w > enemies[i].x &&
                    player.y < enemies[i].y + enemies[i].h &&
                    player.y + player.h > enemies[i].y
                ) {
                    health -= 10;
                    createExplosion(enemies[i].x + 15, enemies[i].y + 15);
                    enemies.splice(i, 1);
                    if (health <= 0) endGame();
                    continue;
                }

                // تصادم مع الرصاص
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (
                        bullets[j].x < enemies[i].x + enemies[i].w &&
                        bullets[j].x + bullets[j].w > enemies[i].x &&
                        bullets[j].y < enemies[i].y + enemies[i].h &&
                        bullets[j].y + bullets[j].h > enemies[i].y
                    ) {
                        enemies[i].health--;
                        createExplosion(bullets[j].x, bullets[j].y);
                        bullets.splice(j, 1);
                        
                        if (enemies[i].health <= 0) {
                            score += 10;
                            createExplosion(enemies[i].x + 15, enemies[i].y + 15);
                            enemies.splice(i, 1);
                            if (score % 500 === 0 && score > 0) level++;
                        }
                        break;
                    }
                }

                if (i >= 0 && enemies[i].y > canvas.height) enemies.splice(i, 1);
            }

            // تحديث الجزيئات
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.1;
                particles[i].life -= 0.02;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            spawnEnemy();
            updateUI();
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الجزيئات
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // رسم الرصاص
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 10;
            bullets.forEach(b => {
                ctx.fillRect(b.x - 1.5, b.y, b.w, b.h);
            });
            ctx.shadowBlur = 0;

            // رسم الأعداء
            enemies.forEach(e => {
                ctx.fillStyle = '#ff3333';
                ctx.shadowColor = '#ff3333';
                ctx.shadowBlur = 10;
                ctx.fillRect(e.x, e.y, e.w, e.h);
                ctx.shadowBlur = 0;
            });

            // رسم اللاعب
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(player.x + 20, player.y);
            ctx.lineTo(player.x, player.y + player.h);
            ctx.lineTo(player.x + player.w, player.y + player.h);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            init();
            gameRunning = true;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('finalLevel').innerText = level;
            document.getElementById('gameOver').classList.remove('hidden');
        }

        function goMenu() {
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('gameOver').classList.add('hidden');
        }

        // بدء اللعبة
        gameLoop();
    </script>
</body>
</html>
