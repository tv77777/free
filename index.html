<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الطائرات المقاتلة</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 800px;
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        }
        canvas {
            background: linear-gradient(to bottom, #000428, #004e92);
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 24px;
            color: #00f2ff;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            display: none;
            border: 2px solid #00f2ff;
            z-index: 20;
            width: 80%;
        }
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00f2ff;
            z-index: 20;
            width: 80%;
        }
        button {
            background: #00f2ff;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            color: #000;
            transition: 0.3s;
        }
        button:hover {
            background: #fff;
            transform: scale(1.1);
        }
        .controls-info {
            font-size: 14px;
            color: #ccc;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">النقاط: <span id="score">0</span></div>

        <div id="start-screen">
            <h1>لعبة الطائرات</h1>
            <p>استخدم الأسهم للتحرك والمسافة للإطلاق</p>
            <button onclick="startGame()">ابدأ اللعب</button>
            <div class="controls-info">أو استخدم W, A, S, D</div>
        </div>

        <div id="game-over">
            <h1>انتهت اللعبة!</h1>
            <p>مجموع نقاطك: <span id="final-score">0</span></p>
            <button onclick="resetGame()">إعادة اللعب</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const startScreen = document.getElementById('start-screen');
        const finalScoreElement = document.getElementById('final-score');

        // ضبط الحجم الحقيقي للكانفاس
        function resize() {
            canvas.width = 600;
            canvas.height = 800;
        }
        resize();

        let score = 0;
        let gameActive = false;
        let keys = {};
        let player, bullets, enemies, particles;

        function initGame() {
            player = {
                x: canvas.width / 2 - 25,
                y: canvas.height - 100,
                width: 50,
                height: 50,
                speed: 8,
                color: '#00f2ff'
            };
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            scoreElement.innerText = '0';
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            startScreen.style.display = 'none';
            initGame();
            gameActive = true;
            gameLoop();
        }

        function drawPlayer() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            
            // جسم الطائرة
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // أجنحة
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 10, player.y + 30, 10, 10);
            ctx.fillRect(player.x + player.width, player.y + 30, 10, 10);
            ctx.shadowBlur = 0;
        }

        function spawnEnemy() {
            if (Math.random() < 0.03) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -40,
                    width: 40,
                    height: 40,
                    speed: 3 + (score / 100), // تزداد السرعة مع النقاط
                    color: '#ff3333'
                });
            }
        }

        function update() {
            if (!gameActive) return;

            // حركة اللاعب
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.width) player.x += player.speed;
            if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= player.speed;
            if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.height) player.y += player.speed;

            // إطلاق النار (تلقائي أو بالضغط)
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length - 1].y < player.y - 120) {
                    bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 15, speed: 12 });
                }
            }

            bullets.forEach((bullet, index) => {
                bullet.y -= bullet.speed;
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;

                if (
                    player.x < enemy.x + enemy.width &&
                    player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height &&
                    player.y + player.height > enemy.y
                ) {
                    gameOver();
                }

                bullets.forEach((bullet, bIndex) => {
                    if (
                        bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y
                    ) {
                        createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        scoreElement.innerText = score;
                    }
                });

                if (enemy.y > canvas.height) enemies.splice(eIndex, 1);
            });

            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(index, 1);
            });

            spawnEnemy();
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    alpha: 1,
                    color: i % 2 === 0 ? '#ffcc00' : '#ff3300'
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // خلفية نجوم بسيطة
            ctx.fillStyle = '#fff';
            for(let i=0; i<5; i++) {
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }

            bullets.forEach(b => {
                ctx.fillStyle = '#00f2ff';
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });

            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);
                ctx.fillStyle = '#000';
                ctx.fillRect(e.x + 5, e.y + 10, 30, 5);
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            drawPlayer();
        }

        function gameOver() {
            gameActive = false;
            gameOverScreen.style.display = 'block';
            finalScoreElement.innerText = score;
        }

        function resetGame() {
            gameOverScreen.style.display = 'none';
            startGame();
        }

        function gameLoop() {
            update();
            draw();
            if (gameActive) requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
