<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare: Security with Integrity</title>
    <style>
        /* --- Basic Styles --- */
        body {
            /* Using standard system fonts that don't need to be downloaded */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; /* Dark background */
            color: #E0E0E0; /* Light grey text */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        /* --- Main Container --- */
        .ad-container {
            background-color: #1E1E1E; /* Slightly lighter dark shade */
            padding: 40px 50px;
            border-radius: 15px;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        /* --- Company Name (instead of logo) --- */
        .company-name {
            font-size: 2em;
            font-weight: 700;
            color: #F38020; /* Cloudflare Orange */
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* --- Headlines --- */
        .headline {
            font-size: 2.2em;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .headline .orange {
            color: #F38020; /* Cloudflare Orange */
        }
        
        .headline .grey {
             color: #B0B0B0; /* Lighter grey for contrast */
        }

        /* --- Main Paragraph --- */
        .main-text {
            font-size: 1.1em;
            margin-top: 25px;
            line-height: 1.6;
        }

        /* --- Hashtags --- */
        .hashtags {
            margin-top: 30px;
            font-size: 0.9em;
            color: #888;
            word-spacing: 15px;
        }
    </style>
</head>
<body>

    <div class="ad-container">
        <!-- Company Name (replaces the external logo) -->
        <div class="company-name">CLOUDFLARE</div>

        <!-- Headlines -->
        <h1 class="headline">
            <span class="orange">Security</span> with <span class="grey">Integrity.</span><br>
            <span class="orange">Speed</span> with <span class="grey">Reliability.</span>
        </h1>

        <!-- Main Text -->
        <p class="main-text">
            Your trusted partner in protecting what's online. We stand for a fair and open internet, providing refuge and defense for all who build on it.
        </p>

        <!-- Hashtags -->
        <p class="hashtags">
            #Cloudflare #InternetSecurity #Reliability #Fairness #TechForGood
        </p>
    </div>

</body>
</html>
